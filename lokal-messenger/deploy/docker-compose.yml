# Fayl: deploy/docker-compose.yml
# Maqsad: Server, PostgreSQL va Redis yagona ichki tarmoqda ishga tushiriladi.
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: msg
      POSTGRES_PASSWORD: STRONG
      POSTGRES_DB: lokal_messenger
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Migratsiya fayllari birinchi ishga tushishda avtomatik bajariladi
      - ../server/db/migrations:/docker-entrypoint-initdb.d:ro
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: always
    # Xotira cheklangan, eng kam ishlatilgan kalitlar siqib chiqariladi
    command:
      [
        "redis-server",
        "--save",
        "60",
        "1",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    networks: [internal]

  server:
    build: ../server
    restart: always
    depends_on: [postgres, redis]
    ports:
      - "8443:8443"
    volumes:
      # TLS sertifikatlari va JWT kaliti shu katalogdan o'qiladi
      - ./tls:/etc/lokal-msg:ro
      # Server konfiguratsiyasi konteyner ichiga ulanadi
      - ./config.yaml:/app/config.yaml:ro
    networks: [internal]

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
