# Fayl: deploy/config.windows.dev.yaml
# Windows dev muhiti uchun server konfiguratsiyasi (setup-windows.bat yaratadi).

server:
  bind_address: "0.0.0.0:8443"
  tls:
    enabled: true
    cert_file: "C:/lokal-msg/tls/server.crt"
    key_file: "C:/lokal-msg/tls/server.key"

database:
  dsn: "postgres://msg:STRONG_DB_PASSWORD@127.0.0.1:5432/lokal_messenger?sslmode=disable"
  max_open_conns: 20
  max_idle_conns: 5

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

auth:
  jwt_secret_file: "C:/lokal-msg/jwt.key"
  access_ttl_minutes: 720
  argon2:
    memory_kb: 65536
    iterations: 3
    parallelism: 2
    salt_length: 16
    key_length: 32

limits:
  max_message_size_bytes: 65536
  max_file_size_bytes: 52428800
  rate_login_per_5min: 5
